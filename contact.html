<section class="py-5">
    <div class="container px-5">
        <div class="text-center mb-5">
            <h1 class="display-5 fw-bolder mb-0">
                <span class="text-gradient d-inline">Contact</span>
            </h1>
            <p class="lead fw-normal text-muted mt-3">
                For performance, directing, production, or collaboration inquiries, please use the form below.

        <div class="row justify-content-center">
            <div class="col-lg-8 col-xl-7">

                <div class="card shadow border-0 rounded-4">

                        <form action="https://formspree.io/f/meevbegw" method="POST">

                            <div class="form-floating mb-3">
                                <input class="form-control" id="name" name="name" type="text" placeholder="Your Name" required>

                                <input class="form-control" id="email" name="email" type="email" placeholder="name@example.com" required>

                            <div class="form-floating mb-3">
                                <input class="form-control" id="subject" name="subject" type="text" placeholder="Subject">
                                <label for="subject">Subject</label>
                            </div>

                            <div class="form-floating mb-3">
                                <textarea class="form-control" id="message" name="message" placeholder="Message" style="height: 10rem" required></textarea>
                                <label for="message">Message</label>
                            </div>

                            <div class="d-grid">
                                <button class="btn btn-primary btn-lg" type="submit">Send Message</button>
